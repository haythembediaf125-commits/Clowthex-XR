name: 🤖 Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: "نوع البناء"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: 🏗️ Build APK
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ☕ Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: 🤖 Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 npm install
        run: npm install

      - name: 🌐 Build React (Vite)
        run: npm run build

      - name: 📥 Download gradle-wrapper.jar
        run: |
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.11.1/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar

      - name: 🔄 Capacitor sync
        run: npx cap sync android --no-deps

      - name: 🔑 chmod gradlew
        run: chmod +x android/gradlew

      - name: 🐛 Build Debug APK
        if: github.event.inputs.build_type != 'release'
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: 📤 Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: StyleStockManager-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
